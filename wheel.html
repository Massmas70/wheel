<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عجلة الحظ</title>
  <style>
    :root{--bg:#0b1220;--card:#101a2d;--line:#243657;--text:#eef2fb;--muted:#8fa2c7;--ok:#22b07d;--warn:#e8b84a}
    body{margin:0;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:520px;margin:0 auto;padding:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
    h2{margin:0 0 8px;font-size:20px}
    .muted{color:var(--muted);font-size:13px}
    .wheel-box{display:flex;justify-content:center;align-items:center;margin:14px 0}
    .wheel{
      width:280px;height:280px;border-radius:50%;
      border:6px solid var(--line);
      background:conic-gradient(
        #3f5f93 0deg 180deg,
        #2e4f83 180deg 270deg,
        #45689a 270deg 324deg,
        #5378ac 324deg 352.8deg,
        #5d86be 352.8deg 360deg
      );
      position:relative;transition:transform 5.2s cubic-bezier(.15,.8,.1,1);
      box-shadow:0 10px 36px rgba(0,0,0,.35);
    }
    .wheel::after{
      content:"🎡";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;
    }
    .pointer{
      width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--warn);
      margin:0 auto 6px;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.45));
    }
    button{
      width:100%;padding:10px;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;
      background:var(--ok);color:#fff
    }
    button:disabled{opacity:.5;cursor:not-allowed}
    .row{margin-top:8px;font-size:14px}
    .result{margin-top:10px;padding:10px;border:1px dashed var(--line);border-radius:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>🎡 عجلة الحظ</h2>
      <div class="muted">لفة واحدة كل 24 ساعة — شرط الشحن خلال 24 ساعة: 50,000+</div>
      <div class="row" id="statusLine">جاري التحقق...</div>
      <div class="wheel-box">
        <div>
          <div class="pointer"></div>
          <div class="wheel" id="wheel"></div>
        </div>
      </div>
      <button id="spinBtn" disabled>🎯 لف الآن</button>
      <div id="result" class="result muted">—</div>
    </div>
  </div>
  <script>
    /** GitHub Pages: استبدل __MINIAPP_API_BASE__ برابط السيرفر العام (HTTPS) الذي يشغّل FastAPI، بدون / أخيرة — مثال: https://panel.example.com */
    const API_BASE = "__MINIAPP_API_BASE__".replace(/\/+$/, "");
    const qp = new URLSearchParams(location.search);
    const embeddedTok = "__WHEEL_TOKEN__";
    const token =
      qp.get("token") ||
      (embeddedTok !== "__WHEEL_TOKEN__" ? embeddedTok : "");
    const wheel = document.getElementById("wheel");
    const spinBtn = document.getElementById("spinBtn");
    const statusLine = document.getElementById("statusLine");
    const result = document.getElementById("result");
    let spinning = false;
    let currentRot = 0;

    function apiPath(path) {
      const p = path.startsWith("/") ? path : "/" + path;
      return API_BASE ? API_BASE + p : p;
    }

    function esc(s){
      if(s===null || s===undefined) return "—";
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function fmtRemain(nowIso, untilIso){
      if(!untilIso) return "متاحة الآن";
      const now = Date.parse(nowIso || new Date().toISOString());
      const until = Date.parse(untilIso);
      let sec = Math.max(0, Math.floor((until-now)/1000));
      if(sec<=0) return "متاحة الآن";
      const d = Math.floor(sec/86400); sec%=86400;
      const h = Math.floor(sec/3600); sec%=3600;
      const m = Math.floor(sec/60);
      return d>0 ? `${d} يوم ${h} ساعة ${m} دقيقة` : `${h} ساعة ${m} دقيقة`;
    }

    async function loadStatus(){
      if (!token) return;
      const res = await fetch(apiPath(`/miniapp/api/wheel/status?token=${encodeURIComponent(token)}`));
      const d = await res.json().catch(()=>({}));
      if(!res.ok || !d.ok){
        statusLine.textContent = "تعذّر تحميل الحالة.";
        spinBtn.disabled = true;
        return;
      }
      const remain = fmtRemain(d.now_at, d.cooldown_until);
      statusLine.innerHTML = `📊 حجم الشحن 24h: <b>${esc(d.volume_24h)}</b> | المتبقي للشرط: <b>${esc(d.volume_need)}</b> | اللفة القادمة: <b>${esc(remain)}</b>`;
      spinBtn.disabled = !d.eligible || spinning;
    }

    function rewardToAngle(label){
      const map = {
        "Hard luck": 90,
        "+10,000": 225,
        "+25,000": 297,
        "+50,000": 338,
        "+100,000": 356,
        "+1,000,000": 359
      };
      return map[label] ?? 90;
    }

    async function doSpin(){
      if(spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.textContent = "جاري اللف...";
      const res = await fetch(apiPath("/miniapp/api/wheel/spin"),{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token})
      });
      const d = await res.json().catch(()=>({}));
      if(!res.ok || !d.ok){
        result.textContent = `❌ ${d.detail || "غير مؤهل حالياً"}`;
        spinning = false;
        await loadStatus();
        return;
      }
      const target = rewardToAngle(d.reward_label);
      currentRot += (360 * 8) + (360 - target);
      wheel.style.transform = `rotate(${currentRot}deg)`;
      setTimeout(async ()=>{
        result.innerHTML = d.reward_wallet > 0
          ? `🎉 ربحت <b>${esc(d.reward_wallet)}</b> — ${esc(d.reward_label)}`
          : `💔 ${esc(d.reward_label)}`;
        spinning = false;
        await loadStatus();
      }, 5300);
    }

    spinBtn.addEventListener("click", doSpin);
    if (!token) {
      statusLine.textContent =
        "رابط غير صالح. افتح عجلة الحظ من زر البوت داخل تليجرام.";
      spinBtn.disabled = true;
      result.textContent =
        API_BASE === "__MINIAPP_API_BASE__"
          ? "للاستضافة على GitHub Pages: عيّن عنوان API في الملف (المربع __MINIAPP_API_BASE__) ثم أعد الرفع."
          : "—";
    } else if (API_BASE === "__MINIAPP_API_BASE__") {
      statusLine.textContent =
        "عرّف عنوان السيرفر في الصفحة (__MINIAPP_API_BASE__) أو افتح العجلة من السيرفر مباشرة.";
      spinBtn.disabled = true;
      result.textContent = "—";
    } else {
      loadStatus();
    }
  </script>
</body>
</html>
